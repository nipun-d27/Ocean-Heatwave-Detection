name: Process Marine Heatwave Submissions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  process-submission:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib

      # 4️⃣ Run submission processing (ML prediction)
      - name: Run Marine Heatwave Prediction
        run: |
          python .github/scripts/process_submission.py

      # 5️⃣ Commit predictions (optional)
      - name: Commit predictions
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add predictions/
          git commit -m "Updated predictions" || echo "No changes to commit"
          git push
