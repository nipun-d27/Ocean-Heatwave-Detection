name: Process Secure Submission

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run the workflow on'
        required: false

permissions:
  contents: write

jobs:
  process-submission:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository (PR-aware)
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.pr_number != '' && format('refs/pull/{0}/head', github.event.inputs.pr_number) || github.head_ref }}

      # 2️⃣ Clean duplicate calculate_scores.py (if exists)
      - name: Clean duplicate calculate_scores.py
        run: |
          echo "Checking for duplicate scoring scripts..."
          if [ -f "scripts/leaderboard/calculate_scores.py" ]; then
            rm scripts/leaderboard/calculate_scores.py
            echo "Removed old duplicate file."
          fi

      # 3️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 4️⃣ Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade cryptography

      # 5️⃣ Verify cryptography (lightweight check)
      - name: Verify cryptography
        run: |
          python -c "from cryptography.hazmat.primitives import serialization; print('cryptography OK')"

      # 6️⃣ Ensure metadata.json exists (SAFE: no overwrite)
      - name: Ensure metadata.json exists
        run: |
          echo "Checking metadata files..."

          if [ -d "submissions" ]; then
            for team_dir in submissions/*/ ; do
              if [ -d "$team_dir" ]; then
                
                if [ ! -f "${team_dir}metadata.json" ]; then
                  echo "Creating metadata.json for $(basename $team_dir)"
                  echo '{
                    "team_name": "'$(basename $team_dir)'",
                    "submission_time": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
                    "description": "Auto-generated metadata"
                  }' > "${team_dir}metadata.json"

                  chmod 644 "${team_dir}metadata.json"
                fi

              fi
            done
          else
            echo "No submissions folder found. Creating one..."
            mkdir -p submissions
          fi

      # 7️⃣ Decrypt, score, and update leaderboard
      - name: Decrypt, Score, and Update Leaderboard
        env:
          SUBMISSION_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          TEST_LABELS_CONTENT: ${{ secrets.TEST_LABELS_CSV }}
        run: |
          echo "Preparing evaluation data..."

          mkdir -p data
          echo "$TEST_LABELS_CONTENT" > data/test_labels_hidden.csv

          export TEST_LABELS_CSV=data/test_labels_hidden.csv

          echo "Running submission processing..."
          python .github/scripts/process_submission.py

      # 8️⃣ Commit and push changes (ONLY on main push)
      - name: Commit and Push Changes (Main branch only)
        if: github.event_name == 'push'
        run: |
          git config user.name "SubmissionBot"
          git config user.email "bot@noreply.github.com"

          git add .

          if ! git diff-index --quiet HEAD; then
            git commit -m "Processed new submission [skip ci]"
            git pull --no-rebase -X theirs origin main
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes to commit."
          fi
